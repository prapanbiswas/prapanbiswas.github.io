<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Lost in Space</title>
    <meta name="description" content="This page doesn't exist. Head back home.">
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/png" sizes="32x32"
        href="attached_assets/file_0000000087f072078bb72ddd1c8138a2_1763603473698.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #06060b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        /* Ambient glow */
        .glow {
            position: fixed;
            width: 500px; height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
            animation: drift 12s ease-in-out infinite alternate;
        }
        .glow-1 { background: #6366f1; top: -20%; left: -10%; }
        .glow-2 { background: #a855f7; bottom: -20%; right: -10%; animation-delay: -6s; }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.15); }
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeUp 0.8s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Big 404 */
        .four-oh-four {
            font-size: clamp(8rem, 25vw, 14rem);
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 40%, #ec4899 70%, #6366f1 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 4s ease infinite;
            position: relative;
            user-select: none;
            cursor: default;
        }
        .four-oh-four:hover {
            animation: shimmer 1s ease infinite, wiggle 0.5s ease;
        }

        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-3deg); }
            75% { transform: rotate(3deg); }
        }

        /* Subtitle */
        .subtitle {
            color: rgba(255,255,255,0.35);
            font-size: clamp(0.85rem, 2vw, 1rem);
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 0.5rem;
            margin-bottom: 3rem;
        }

        /* Home button — icon only */
        .home-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px; height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border: none;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
            box-shadow: 0 4px 24px rgba(99,102,241,0.3);
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }
        .home-btn::before {
            content: '';
            position: absolute; inset: 0;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .home-btn:hover {
            transform: translateY(-4px) scale(1.08);
            box-shadow: 0 8px 40px rgba(99,102,241,0.5), 0 0 80px rgba(168,85,247,0.2);
        }
        .home-btn:hover::before { opacity: 1; }
        .home-btn:active { transform: translateY(-2px) scale(1.02); }

        .home-btn svg {
            width: 26px; height: 26px;
            color: #fff;
            position: relative;
            z-index: 1;
            transition: transform 0.3s;
        }
        .home-btn:hover svg { transform: scale(1.1); }

        /* Floating particles */
        .particle {
            position: fixed;
            width: 3px; height: 3px;
            background: rgba(99,102,241,0.4);
            border-radius: 50%;
            pointer-events: none;
            animation: float-particle linear infinite;
        }
        @keyframes float-particle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
    </style>
</head>

<body>
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <div class="container">
        <div class="four-oh-four">404</div>
        <div class="subtitle">Lost in space</div>
        <a href="/" class="home-btn" title="Go Home" aria-label="Go back to homepage">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
            </svg>
        </a>
    </div>

    <!-- Floating particles -->
    <script>
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.animationDuration = (6 + Math.random() * 10) + 's';
            p.style.animationDelay = Math.random() * 8 + 's';
            p.style.width = p.style.height = (2 + Math.random() * 3) + 'px';
            p.style.background = Math.random() > 0.5
                ? 'rgba(99,102,241,0.3)'
                : 'rgba(168,85,247,0.3)';
            document.body.appendChild(p);
        }
    </script>
</body>

</html>
